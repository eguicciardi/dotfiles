import = ["~/.config/alacritty/catppuccin/catppuccin-macchiato.toml"]
live_config_reload = true
working_directory = "Development"

# [shell]
# program = "/bin/zsh"
# args = ["--login", "-c", "tmux new-session -A -s main-alacritty"]

[env]
TERM = "xterm-256color"

[window]
decorations = "Full"
dynamic_padding = false
opacity = 0.9
blur = true
dynamic_title = true

[window.padding]
x = 5
y = 0

[window.dimensions]
columns = 200
lines = 60

[font]
size = 14.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[cursor]
thickness = 0.5

[cursor.style]
shape = "Beam"
blinking = "On"

[selection]
save_to_clipboard = true
